# ============================================================
# ACS ECG Detector — гиперпараметры для grid-search
# ============================================================
# Используется Optuna (python run.py --stage cnn --tune)
# Значения по умолчанию — в config/config.yaml

baseline:
  LogisticRegression:
    C: [0.01, 0.1, 1.0, 10.0]
    max_iter: [500, 1000, 2000]

  RandomForest:
    n_estimators: [100, 200, 500]
    max_depth: [4, 8, 16, null]

  XGBoost:
    n_estimators: [50, 100, 200]
    max_depth: [3, 5, 7]
    learning_rate: [0.01, 0.1, 0.3]

cnn:
  learning_rate: [1e-4, 5e-4, 1e-3]
  batch_size: [32, 64, 128]
  dropout: [0.2, 0.3, 0.5]
  weight_decay: [1e-5, 1e-4, 1e-3]

multimodal:
  learning_rate: [1e-4, 5e-4]
  dropout: [0.2, 0.3, 0.4]
  freeze_encoder: [true, false]
