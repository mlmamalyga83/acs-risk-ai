# ============================================================
# ACS ECG Detector — основной конфигурационный файл
# ============================================================

data:
  raw_path: "data/raw/ptb-xl/"
  processed_path: "data/processed/"
  external_path: "data/external/"
  sample_rate: 500
  cycle_length: 350

preprocessing:
  filter_lowcut: 0.5
  filter_highcut: 40.0
  notch_freq: 50.0
  aVR_invert: true
  r_peak_detector: "neurokit2"     # fallback: wfdb.gqrs_detect
  window_before_sec: 0.25
  window_after_sec: 0.45
  augment_noise_level: 0.01
  augment_scale_range: [0.9, 1.1]
  augment_time_warp: [0.85, 1.15]
  augment_time_shift_fraction: 0.1

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_state: 42

model_cnn:
  architecture: "simple"            # simple1d, resnet1d
  input_channels: 12
  hidden_channels: [32, 64, 128]
  dropout: 0.3
  embedding_dim: 64                # для мультимодальной модели

model_clinical:
  hidden_units: [64, 32]
  output_dim: 32

multimodal:
  concat_dim: null                  # вычисляется: embedding_dim + clinical.output_dim
  freeze_encoder: false             # сравнивается в ablation

training:
  seed: 42
  batch_size: 32                     # CPU: 32, GPU: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 20
  patience: 10                       # early stopping
  use_amp: true                     # mixed precision на GPU
  gradient_clip: 1.0
  num_workers: 2

baseline:
  LogisticRegression:
    C: 0.1
    max_iter: 2000
  RandomForest:
    n_estimators: 200
    max_depth: 8
    class_weight: "balanced"
  XGBoost:
    n_estimators: 100
    max_depth: 5
    
tune:
  n_trials: 20
  max_epochs_per_trial: 20

paths:
  models: "models/"
  reports: "reports/"
  logs: "logs/"
  runs: "runs/"
  demo_data: "src/app/demo_data/"
